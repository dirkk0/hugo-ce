{{ partial "header.html" . }}

<main class="fadein">
  <h1>{{ i18n "tagged" }}: {{ .Title }}</h1>
  <p><a href="{{ with .Parent }}{{ .RelPermalink }}{{ else }}{{ "tags/" | relURL }}{{ end }}">← {{ i18n "all_tags" }}</a></p>

  <ul class="news-list">
    {{ range .Data.Pages }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title | markdownify }}</a>
      {{ with .Description }}<p>{{ . }}</p>{{ end }}
    </li>
    {{ end }}
  </ul>
</main>

{{ partial "footer.html" . }}
