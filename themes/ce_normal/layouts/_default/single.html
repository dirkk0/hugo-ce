{{ partial "header.html" . }}
<!-- single template -->

<main class="fadein">
  <div class="article-meta">
    <h1>{{ .Title | markdownify }}</h1>
    <!-- {{ with .Params.author }}<h2 class="author">{{ . }}</h2>{{ end }} -->
    {{ if (gt .Params.date 0) }}
    <span class="project-date">
      {{ .Date.Format "2006/01/02" }}
    </span>
    {{ end }}
  </div>

  {{ partial "taglist.html" . }}
  
  <article>
    {{ .Content }}
  </article>


</main>


{{ partial "footer.html" . }}
