{{ partial "header.html" . }}

<main class="fadein">
  <h1>{{ .Title }}</h1>
  <p>Browse our work by topic and technology.</p>

  <ul class="terms">
    {{ range .Data.Terms.Alphabetical }}
    <li>
      <a href="{{ .Page.RelPermalink }}">{{ .Page.Title }}</a> ({{ .Count }})
    </li>
    {{ end }}
  </ul>
</main>

{{ partial "footer.html" . }}
