languages:
  en:
    languageName: "EN"
    weight: 1
  de:
    languageName: "DE"
    params:
      navigation:
        help: Hilfe
    weight: 2


params:
  description: "Curious Electric is a creative engineering studio turning problems into products — with meaning, love, and brain."
  footer: "&copy; Curious Electric GmbH 2017 - {Year}"

markup:
  highlight:
    codeFences: false
  goldmark:
    renderer:
      unsafe: true

privacy:
  disqus:
    disable: false
  googleAnalytics:
    anonymizeIP: false
    disable: false
    respectDoNotTrack: false
    useSessionStorage: false
  instagram:
    disable: false
    simple: false
  twitter:
    disable: false
    enableDNT: false
    simple: false
  vimeo:
    disable: false
    enableDNT: false
    simple: false
  youtube:
    disable: false
    privacyEnhanced: false