baseurl: "https://curious-electric.com/w/v2/"
languageCode: "en-us"
title: "Curious Electric"
theme: "ce_normal"
googleAnalytics: ""
disqusShortname: ""
ignoreFiles: ["\\.Rmd$", "\\.Rmarkdown$", "_cache$", "\\.knit\\.md$", "\\.utf8\\.md$"]
footnotereturnlinkcontents: "↩"
# canonifyURLs: false

# whoha ... this is already default!
taxonomies:
   tag: "tags"
   category: "categories"

# [taxonomies]
#   tag = "tags"
#   category = "categories"


# sectionPagesMenu: "lazymains"

permalinks:
  note: "/note/:year/:month/:day/:slug/"
  post: "/post/:year/:month/:day/:slug/"

